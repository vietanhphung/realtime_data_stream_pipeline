# ============================================================
# Real-Time Data Streaming Pipeline (Docker Compose)
# ============================================================
#
# 🔹 Messaging Layer:
#   - ZooKeeper: coordination service for Kafka
#   - Kafka Broker: event streaming platform
#   - Schema Registry: manages schemas
#   - Control Center: UI for Kafka monitoring
#
# 🔹 Orchestration:
#   - Airflow (webserver + scheduler)
#   - PostgreSQL: metadata DB
#
# 🔹 Processing:
#   - Spark master + worker
#
# 🔹 Storage:
#   - Cassandra database
#
# 🔹 Networking:
#   - All services share "confluent" network
#
# ============================================================

services:

  # ============================================================
  # 🟣 ZooKeeper (Kafka coordination)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ['CMD', 'bash', '-c', "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - confluent


  # ============================================================
  # 🔵 Kafka Broker (core message system)
  # ============================================================
  broker:
    image: confluentinc/cp-server:7.4.0
    hostname: broker
    container_name: broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # external access
      - "9101:9101"   # JMX monitoring
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'

      # internal + external access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092

      # replication (single node setup)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      # performance tuning
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # monitoring
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost

      # schema registry integration
      KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL: http://schema-registry:8081

      # metrics
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: broker:29092
      CONFLUENT_METRICS_ENABLE: 'false'

    networks:
      - confluent

    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost 9092" ]
      interval: 10s
      timeout: 5s
      retries: 5


  # ============================================================
  # 🟢 Schema Registry
  # ============================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'broker:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - confluent
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/" ]
      interval: 30s
      timeout: 10s
      retries: 5


  # ============================================================
  # 🟡 Kafka Control Center (UI)
  # ============================================================
  control-center:
    image: confluentinc/cp-enterprise-control-center:7.4.0
    hostname: control-center
    container_name: control-center
    depends_on:
      broker:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker:29092'
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      PORT: 9021
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9021/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - confluent


  # ============================================================
  # 🔶 Airflow Webserver
  # ============================================================
  webserver:
      image: apache/airflow:2.6.0-python3.9
      command: webserver
      entrypoint: ['/opt/airflow/script/entrypoint.sh']
      depends_on:
        - postgres
      environment:
        - LOAD_EX=n
        - EXECUTOR=Sequential #chagne when in production
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW_WEBSERVER_SECRET_KEY=this_is_a_very_secured_key
      logging:
        options:
          max-size: 10m
          max-file: "3"
      volumes:
        - ./dags:/opt/airflow/dags
        - ./script/entrypoint.sh:/opt/airflow/script/entrypoint.sh
        - ./requirements.txt:/opt/airflow/requirements.txt
      ports:
        - "8080:8080"
      healthcheck:
        test: ['CMD-SHELL', "[ -f /opt/airflow/airflow-webserver.pid ]"]
        interval: 30s
        timeout: 30s
        retries: 3
      networks:
        - confluent



  # ============================================================
  # 🔶 Airflow Scheduler
  # ============================================================
  scheduler:
    image: apache/airflow:2.6.0-python3.9
    depends_on:
      webserver:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./script/entrypoint.sh:/opt/airflow/script/entrypoint.sh
      - ./requirements.txt:/opt/airflow/requirements.txt
    environment:
      - LOAD_EX=n
      - EXECUTOR=Sequential
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW_WEBSERVER_SECRET_KEY=this_is_a_very_secured_key
    command: bash -c "pip install -r ./requirements.txt && airflow db upgrade && airflow scheduler"
    networks:
      - confluent


# ============================================================
# 🌐 DB
# ============================================================
  postgres:
    image: postgres:14.0
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432" #expose for inspection only
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - confluent


  spark-master:
    image: spark:3.5.8-python3
    container_name: spark-master
    hostname: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "9090:8080"
      - "7077:7077"
    networks:
      - confluent

  spark-worker:
    image: spark:3.5.8-python3
    container_name: spark-worker
    hostname: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    networks:
      - confluent

  cassandra_db:
    image: cassandra:latest
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
      - CASSANDRA_USERNAME=cassandra
      - CASSANDRA_PASSWORD=cassandra
    networks:
      - confluent


# ============================================================
# 🌐 Shared Network
# ============================================================
networks:
  confluent: